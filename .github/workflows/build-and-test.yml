name: Build and Test

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - "*"

  schedule:
    - cron: "0 0 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- Core suite: mesh + implicit-field only.  No OCP installed. ---
  # Proves `import microgen` + `.generate_vtk()` + F-rep work on VTK 9.4+
  # with no CAD stack.
  core-no-cad:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macos-latest"]
        python-version: ["3.10", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}

      - if: runner.os == 'Linux'
        run: sudo apt-get install libglu1-mesa

      - run: uv sync --extra dev
      - run: uv pip install .
      # Pin to VTK 9.4 to prove it actually installs cleanly now that
      # cadquery no longer constrains the dep tree.
      - run: uv pip install 'vtk>=9.4' 'pyvista>=0.47'
      - run: |
          uv run pytest tests/test_cad_optional.py tests/shapes/test_implicit_ops.py tests/shapes/test_tpms_frep.py -q

  # --- CAD suite: full test run with OCP installed via the [cad] extra. ---
  cad:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macos-latest"]
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}

      - if: runner.os == 'Linux'
        run: sudo apt-get install libglu1-mesa

      - run: uv sync --extra dev --extra cad
      - run: uv pip install '.[cad]'
      - run: uv run pytest --numprocesses=auto
