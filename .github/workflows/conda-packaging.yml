name: Create conda package

on:
  workflow_dispatch:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Conda packaging (noarch)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: packaging
          conda-solver: libmamba

      - name: Build Package
        shell: bash -l {0}
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          PACKAGE_VERSION="${GITHUB_REF_NAME#v}"
          export PACKAGE_VERSION
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> "$GITHUB_ENV"
          conda install -y conda-build
          conda config --set anaconda_upload no
          conda-build conda.recipe -c conda-forge --output-folder .

      - name: Upload to Anaconda
        shell: bash -l {0}
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
        run: |
          if [[ "$PACKAGE_VERSION" == *dev* || "$PACKAGE_VERSION" == *rc* \
              || "$PACKAGE_VERSION" =~ [0-9]a[0-9] || "$PACKAGE_VERSION" =~ [0-9]b[0-9] ]]; then
            UPLOAD_LABEL="dev"
          else
            UPLOAD_LABEL="main"
          fi
          conda install -y anaconda-client
          anaconda upload noarch/*.conda --force --no-progress -l "$UPLOAD_LABEL"
