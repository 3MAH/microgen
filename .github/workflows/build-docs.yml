name: Documentation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

env:
  USE_CACHE: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-doc:
    runs-on: "ubuntu-latest"
    env:
      PYVISTA_OFF_SCREEN: "True"
      ALLOW_PLOTTING: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install libGLU
        run: sudo apt-get install -y libglu1-mesa

      - name: Install package with docs dependencies
        run: pip install .[docs]

      - name: Install VTK-OSMesa for headless rendering
        run: |
          pip uninstall vtk -y
          pip install vtk-osmesa --extra-index-url https://wheels.vtk.org

      - name: Cache Sphinx build directory
        uses: actions/cache@v4
        if: env.USE_CACHE == 'true'
        with:
          path: docs/_build/
          key: doc-build-${{ hashFiles('microgen/__init__.py') }}-${{ hashFiles('docs/**/*.rst') }}
          restore-keys: |
            doc-build-${{ hashFiles('microgen/__init__.py') }}-
            doc-build-

      - name: Build Documentation
        run: make -C docs html

      - name: Upload HTML documentation
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-build
          path: docs/_build/html/

      # Deploy to microgen-docs/main only for main/master branch
      - name: Deploy HTML documentation (main branch)
        if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.MICROGEN_DOC_TOKEN }}
          external_repository: 3MAH/microgen-docs
          publish_branch: main
          publish_dir: ./docs/_build/html
          force_orphan: true

      # Deploy to microgen-docs/PRXX for each pull request
      - name: Deploy HTML documentation (pull request)
        if: ${{ github.event_name == 'pull_request' }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.MICROGEN_DOC_TOKEN }}
          external_repository: 3MAH/microgen-docs
          publish_branch: PR${{ github.event.pull_request.number }}
          publish_dir: ./docs/_build/html
          force_orphan: true
